<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B 통합 재난 대응 대시보드</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-velocity/dist/leaflet-velocity.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet-velocity/dist/leaflet-velocity.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div id="sidebar" style="display: flex; flex-direction: column; height: 100vh;">
        <h2 style="font-size: 18px; text-align: center; color: #fff;">재난/기상 통합 관제</h2>
        
        <div class="panel" id="plant-info-panel" style="border-left: 4px solid #4facfe; transition: border-color 0.3s;">
            <h3>원전 상태 상세</h3>
            <div id="plant-details">
                <div class="empty-state">
                    지도에서 원전을 선택해주세요.
                </div>
            </div>
        </div>

        <div class="panel" id="timeline-panel">
            <h3>실시간 재난/공지 타임라인</h3>
            <div id="timeline-content">데이터 로딩 중...</div>
        </div>

        <div class="panel" id="rag-panel" style="display: none; border-left: 4px solid #F44336; background: #2a1111;">
            <h3 style="color: #ff4b2b;">🚨 실시간 비상 브리핑 (RAG)</h3>

            <button id="btn-clear-emergency" style="width: 100%; padding: 8px; margin-bottom: 10px; background-color: #d32f2f; color: white; border: 1px solid #b71c1c; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s;">
                ⏹️ 비상 상황 수동 해제
            </button>

            <div id="rag-messages" style="height: 150px; overflow-y: auto; padding: 10px; font-size: 13px; background: #1a0a0a; border-radius: 4px; border: 1px solid #441111;">
                <div class="empty-state" style="color: #ff9a9e;">비상 시스템 대기 중...</div>
            </div>
        </div>

        <div class="panel" id="training-panel" style="margin-top: auto; border-top: 1px solid #444; padding-top: 15px; margin-bottom: 0;">
            <h3 style="color: #ff9800; font-size: 14px; margin-bottom: 10px;">🛠️ 시스템 훈련</h3>
            <button id="btn-toggle-training" style="width: 100%; padding: 8px; background-color: #ff9800; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                훈련 모드 시작
            </button>
        </div>
    </div>

    <div id="map-container">
        <div id="status-indicator" style="position: absolute; top: 15px; left: 60px; z-index: 1000; background: rgba(40, 167, 69, 0.9); color: white; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: none; border: 1px solid #1e7e34;">
            🟢 평시 모드 (Normal)
        </div>

        <div id="loading">바람장 데이터를 처리 중입니다...<br>(최대 1~2초 소요)</div>
        
        <div id="map"></div>
    </div>

    <div id="training-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#222; padding:25px; z-index:2000; border:2px solid #ff9800; border-radius:8px; color:white; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.8);">
        <h3 style="color: #ff9800; margin-bottom: 15px; text-align: center;">가상 훈련 설정</h3>
        
        <label style="display:block; margin-bottom: 15px;">훈련 대상 원전: 
            <select id="train-plant-select" style="width:100%; padding:8px; margin-top:5px; background:#333; color:white; border:1px solid #555; border-radius:4px; outline:none;">
                <option value="">데이터 로딩 중...</option>
            </select>
        </label>
        
        <label style="display:block; margin-bottom: 25px;">예상 도착 시간 (ETA, 초): 
            <input type="number" id="train-eta" value="120" style="width:100%; padding:8px; margin-top:5px; background:#333; color:white; border:1px solid #555; border-radius:4px; outline:none;">
        </label>
        
        <div style="display: flex; justify-content: space-between;">
            <button id="btn-cancel-training" style="padding: 8px 15px; background: #555; color: white; border: none; border-radius: 4px; cursor: pointer;">취소</button>
            <button id="btn-start-training" style="padding: 8px 15px; background: #ff9800; color: black; font-weight: bold; border: none; border-radius: 4px; cursor: pointer;">발령</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
    <script src="{{ url_for('static', filename='js/simulation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
