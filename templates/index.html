<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B 통합 재난 대응 대시보드</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-velocity/dist/leaflet-velocity.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet-velocity/dist/leaflet-velocity.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div id="sidebar">
        <button id="sidebar-toggle">◀</button>
        
        <h2 style="font-size: 18px; text-align: center; color: #fff;">재난/기상 통합 관제</h2>
        
        <div class="panel" id="plant-info-panel" style="border-left: 4px solid #4facfe; transition: border-color 0.3s;">
            <h3>원전 상태 상세</h3>
            <div id="plant-details">
                <div class="empty-state">
                    지도에서 원전을 선택해주세요.
                </div>
            </div>
        </div>

        <div class="panel" id="timeline-panel">
            <h3>실시간 재난/공지 타임라인</h3>
            <div id="timeline-content">데이터 로딩 중...</div>
        </div>

        <div class="panel" id="chat-panel">
            <h3>대응 매뉴얼 AI 챗봇</h3>
            <div id="chat-messages" style="height: 150px; overflow-y: auto; background: #222; padding: 10px; margin-bottom: 5px; font-size: 13px;">
                <div style="color: #aaa;">[AI] 궁금한 매뉴얼이나 조치사항을 물어보세요.</div>
            </div>
            <div style="display: flex;">
                <input type="text" id="chat-input" style="flex: 1; padding: 5px; background: #333; color: white; border: 1px solid #555;" placeholder="질문 입력...">
                <button id="chat-send" style="padding: 5px 10px; background: #4facfe; color: white; border: none; cursor: pointer;">전송</button>
            </div>
        </div>
    </div>

    <div id="map-container">
        <div id="status-indicator" style="position: absolute; top: 15px; left: 60px; z-index: 1000; background: rgba(40, 167, 69, 0.9); color: white; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: none; border: 1px solid #1e7e34;">
            🟢 평시 모드 (Normal)
        </div>

        <div id="loading">바람장 데이터를 처리 중입니다...<br>(최대 1~2초 소요)</div>
        
        <div id="sim-controls">
            <h3 style="margin-bottom: 10px; font-size:13px; text-align: center;">시뮬레이션 모드</h3>
            <button id="btn-toggle-sim">가상 사고 위치 지정 (Off)</button>
        </div>
        
        <div id="map"></div>
    </div>

    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
    <script src="{{ url_for('static', filename='js/simulation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script></body>
</html>
